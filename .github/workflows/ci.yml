name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint || true
      - run: npm run build

  api:
    name: API (Express + Supabase)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [frontend, api]
    if: always()
    steps:
      - name: Post CI result to Discord
        env:
          DISCORD_CHANNEL: "1496614848983863357"
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          STATUS: ${{ (needs.frontend.result == 'success' && needs.api.result == 'success') && 'success' || 'failure' }}
        run: |
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"; MSG="CI PASS"
          else
            EMOJI="❌"; MSG="CI FAIL"
          fi
          curl -s -X POST \
            -H "Authorization: Bot $DISCORD_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL/messages" \
            -d "{\"content\":\"$EMOJI **$MSG** — \`${{ github.head_ref || github.ref_name }}\` → \`${{ github.base_ref || 'develop' }}\`\n📦 **symptothermie** — [voir le run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}"
